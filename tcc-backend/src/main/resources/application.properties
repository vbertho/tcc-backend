spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:../../.env[.properties]

spring.application.name=tcc-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER:${DB_USERNAME}}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:2592000000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB