spring.config.import=

spring.datasource.url=jdbc:h2:mem:tcc_e2e;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-e2e.sql

jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef
jwt.expiration-ms=2592000000
SWAGGER_ENABLED=false
